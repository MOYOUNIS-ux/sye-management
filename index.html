<style>
/* CSS Styles */
:root{--bg:#f7fbfc;--card:#fff;--muted:#64707a;--accent:#2aa6c6;--accent-2:#6fd1c0;--radius:12px;--shadow:0 10px 30px rgba(17,24,39,0.06);--success:#16a34a; --error: #dc2626;}
*{box-sizing:border-box} html,body{height:100%} body{font-family:'Tajawal',sans-serif;background:var(--bg);margin:0;color:#0b2a33;padding:28px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1100px;margin:0 auto;animation:fadeIn 450ms ease both} @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
header{display:flex;align-items:center;gap:16px; justify-content: space-between;} 
header img{height:56px;filter:drop-shadow(0 4px 12px rgba(42,166,198,0.12));border-radius:8px} 
header h1{margin:0;font-size:20px;color:#08303a} 
.muted{color:var(--muted);font-size:13px} 
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-top:14px;transition:transform 160ms ease}
.card:hover{transform:translateY(-4px)} 
.row{display:flex;gap:12px;align-items:flex-end; margin-bottom: 12px;} 
.col{flex:1} label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px} 

/* Required Star Style */
.required-star {
    color: var(--error);
    margin-right: 4px;
    font-weight: 700;
}

/* === Unified Input Styles & LTR (Applied to all relevant form controls) === */
input[type=text], input[type=number], input[type=date], select, textarea {
    width:100%; padding:10px; border-radius:10px; 
    border:2px solid var(--accent); 
    background:transparent; 
    color:inherit; outline:none; transition:box-shadow 120ms ease; 
    direction:ltr; 
    text-align:left;
    -webkit-appearance: none; 
    -moz-appearance: textfield; 
} 
/* Ensure Arabic text inputs align right */
html[dir="rtl"] input#custName, html[dir="rtl"] textarea#saleNotes {
    direction: rtl;
    text-align: right;
}
html[dir="ltr"] input#custName, html[dir="ltr"] textarea#saleNotes {
    direction: ltr;
    text-align: left;
}

/* Specific adjustments for date and select to match unified style */
input[type=date] { direction: ltr; text-align: left; }
select {
    appearance: none; 
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path fill="%2364707a" d="M0 0l5 6 5-6z"/></svg>');
    background-repeat: no-repeat;
    background-position: left 10px center; 
    padding-left: 25px; 
    padding-right: 10px; 
}
html[dir="ltr"] select {
    background-position: right 10px center; 
    padding-left: 10px; 
    padding-right: 25px;
}


input:focus, select:focus, textarea:focus{box-shadow:0 6px 18px rgba(42,166,198,0.2);border-color:var(--accent)}
button{padding:10px 14px;border-radius:10px;border:0;cursor:pointer;font-weight:700;transition:transform 120ms ease,box-shadow 120ms ease} button:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(90deg,var(--accent-2),var(--accent));color:#fff;box-shadow:0 8px 24px rgba(42,166,198,0.12)}
.btn-primary:hover{filter:brightness(1.03)} .btn-ghost{background:transparent;color:var(--muted);border:1px solid #e6eef2} 
table{width:100%;border-collapse:collapse;margin-top:12px} 
html[dir="rtl"] th, html[dir="rtl"] td{padding:8px;text-align:right;border-bottom:1px solid #f0f4f6;font-size:14px} 
html[dir="ltr"] th, html[dir="ltr"] td{padding:8px;text-align:left;border-bottom:1px solid #f0f4f6;font-size:14px} 

.totals{display:flex;gap:12px;justify-content:flex-end;margin-top:20px; padding-top: 10px; border-top: 1px solid #e6eef2;} 
.box{background:#fbfeff;padding:10px 14px;border-radius:10px;border:1px solid #eef6f8} 
footer{text-align:center;margin-top:26px;color:var(--muted);font-size:13px}
.small{font-size:13px;color:var(--muted)}
@media(max-width:900px){.row{flex-direction:column}.actions{flex-direction:column-reverse;align-items:stretch} header{flex-direction:column;align-items:flex-start}}
.card .row.card{background:#fbfeff;padding:12px;border-radius:10px;border:1px solid #f1f6f8}
.alert-success{background:var(--success);color:#fff;padding:10px;border-radius:10px;text-align:center;margin-top:12px}

/* Consistency classes */
.f-1_4 { flex: 1 1 23%; } 
.f-1_3 { flex: 1 1 30%; } 

/* Style for Manual Totals Input */
.manual-total-input {
    background: #fff; 
    font-weight: 700;
}
</style>

</div>

<div class="row">

<div class="row">

    <div class="f-1_4">

let T = langMap[currentLang]; // Alias for current language texts

/* Language Switching Function */
function changeLanguage(lang) {
    currentLang = lang;
    T = langMap[lang];

    // --- 1. Update overall page direction and attributes ---
    document.documentElement.dir = T.dir;
    document.body.setAttribute('data-lang', lang);

    // --- 2. Update static texts and placeholders ---
    document.getElementById('headerTitle').textContent = T.headerTitle;
    document.getElementById('headerSubtitle').textContent = T.headerSubtitle;
    document.getElementById('footerText').textContent = T.footerText;
    document.getElementById('custName').placeholder = T.placeholderCustName;
    document.getElementById('saleScreen').placeholder = T.placeholderScreen;
    document.getElementById('saleNotes').placeholder = T.placeholderNotes;

    // --- 3. Update main labels (with required star) ---
    document.getElementById('labelDate').innerHTML = `<span class="required-star">*</span> ${T.labelDate}`;
    document.getElementById('labelCustName').innerHTML = `<span class="required-star">*</span> ${T.labelCustName}`;
    document.getElementById('labelCustPhone').innerHTML = `<span class="required-star">*</span> ${T.labelCustPhone}`;
    document.getElementById('labelEmployee').innerHTML = `<span class="required-star">*</span> ${T.labelEmployee}`;
    document.getElementById('labelBranch').innerHTML = `<span class="required-star">*</span> ${T.labelBranch}`;
    document.getElementById('labelPaymentMethod').innerHTML = `<span class="required-star">*</span> ${T.labelPaymentMethod}`;
    document.getElementById('labelClientType').innerHTML = `<span class="required-star">*</span> ${T.labelClientType}`;
    document.getElementById('labelProgram').innerHTML = `<span class="required-star">*</span> ${T.labelProgram}`;
    document.getElementById('labelChannel').innerHTML = `<span class="required-star">*</span> ${T.labelChannel}`;
    document.getElementById('labelScreen').innerHTML = `<span class="required-star">*</span> ${T.labelScreen}`;
    document.getElementById('labelNotes').textContent = T.labelNotes;
    
    // Updated Combined Section
    document.getElementById('sectionItems').textContent = T.sectionItems; 
    document.getElementById('btnAddItem').textContent = T.btnAddItem;

    document.getElementById('labelGrandTotal').innerHTML = `<span class="required-star">*</span> ${T.labelGrandTotal}`;
    document.getElementById('labelPaidAmount').innerHTML = `<span class="required-star">*</span> ${T.labelPaidAmount}`;

    // Update Channel select placeholder
    const channelSelect = document.getElementById('saleChannel');
    if (channelSelect.options[0].value === "") {
        channelSelect.options[0].textContent = T.selectPlaceholder;
    }

    // --- 4. Update action buttons ---
    document.getElementById('btnPreview').textContent = T.btnPreview;
    document.getElementById('btnDownload').textContent = T.btnDownload;
    document.getElementById('btnSave').textContent = T.btnSave;
    document.getElementById('btnReset').textContent = T.btnReset;
    document.getElementById('btnWhatsapp').textContent = T.btnWhatsapp;
    document.getElementById('btnPrint').textContent = T.btnPrint;

    // --- 5. Update Totals boxes ---
    const totalDue = document.getElementById('dueAmount').textContent;
    const totalOverpay = document.getElementById('overpay').textContent;
    
    document.getElementById('boxDue').innerHTML = `${T.boxDue}: <strong id="dueAmount" dir="ltr">${totalDue}</strong> EGP`;
    document.getElementById('boxOverpay').innerHTML = `${T.boxOverpay}: <strong id="overpay" dir="ltr">${totalOverpay}</strong> EGP`;

    // --- 6. Update dynamic rows (Items) ---
    // Preserve existing selection values
    const itemsData = Array.from(document.querySelectorAll('#servicesList .serviceName')).map(s => s.value);

    // Clear and re-render the lists
    document.getElementById('servicesList').innerHTML = '';

/* Dynamic Item Row (Services/Books combined) */
function addServiceRow(defaultValue = null, allowEmpty = true){
  const container = document.getElementById('servicesList');
  const wrapper = document.createElement('div');
  wrapper.className='row card'; wrapper.style.marginTop='8px'; wrapper.style.alignItems='center';
  // Item selection takes all flexible space, button fixed width
  wrapper.innerHTML=`<div style="flex:1 1 85%;"><label>${T.labelItem}</label><select class="serviceName"></select></div>
  <div style="flex:0 0 100px;display:flex;align-items:flex-end;justify-content:flex-end"><button class="btn-ghost" onclick="removeRow(this)">${T.labelRemove}</button></div>`;
  container.appendChild(wrapper);
  const sel = wrapper.querySelector('.serviceName');
  
  if (allowEmpty) {
      const empty = document.createElement('option');
      empty.value = '';
      empty.textContent = T.selectPlaceholder;
      sel.appendChild(empty);
  }
  
  ALL_ITEMS.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o)});
  if(defaultValue) sel.value=defaultValue;
}


function removeRow(btn){ 
    const card=btn.closest('.card'); 
    card.remove(); 
}

/* Totals (Only calculates Due/Overpay based on manual input) */
function calculateTotals(){
    // Read total and paid amounts manually entered by user
  const total = parseFloat(document.getElementById('grandTotal').value || 0);
  const paid = parseFloat(document.getElementById('paidAmount').value || 0);
    
    // Calculate Due/Overpay
  const due=Math.max(0,total-paid);
  const over=Math.max(0,paid-total);
    
    // Update display
  document.getElementById('dueAmount').innerText=due.toFixed(2);
  document.getElementById('overpay').innerText=over.toFixed(2);
}

/* Helper to populate select options (Used only for static fields like Employee/Branch) */
function populateSelect(selectId, options, includeEmpty=true) {
    const select = document.getElementById(selectId);
    // Preserve current selection if possible
    const currentValue = select.value;
    
    select.innerHTML = ''; 
    if (includeEmpty) {
        const empty = document.createElement('option');
        empty.value = '';
        empty.textContent = T.selectPlaceholder;
        select.appendChild(empty);
    }
    options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt;
        o.textContent = opt;
        select.appendChild(o);
    });
    
    // Restore current selection
    if (currentValue) {
        select.value = currentValue;
    }
}

  // Collect sold items list only (names)
  const items=[];
  document.querySelectorAll('#servicesList .card').forEach(c=>{ 
    const name = c.querySelector('.serviceName').value;
    if(name) items.push({name, qty: 1, price: 0}); 
  });

  const total=parseFloat(document.getElementById('grandTotal').value||0); // Manual Input
  const paid=parseFloat(document.getElementById('paidAmount').value||0); // Manual Input
    
    // CRM data
    const crmData = {
        employee: document.getElementById('saleEmployee').value,
        program: document.getElementById('saleProgram').value,
        channel: document.getElementById('saleChannel').value,
        clientType: document.getElementById('saleClientType').value,
        branch: document.getElementById('saleBranch').value,
        method: document.getElementById('salePaymentMethod').value,
        screen: document.getElementById('saleScreen').value,
        status: (total === paid) ? 'Paid' : (paid > 0 ? 'Pending' : 'Unpaid'), 
        amount: paid 
    };


  return {
        ...crmData,
        invoiceNo: currentInvoiceNumber, 
        date: document.getElementById('invoiceDate').value,
        customer: document.getElementById('custName').value,
        phone: document.getElementById('custPhone').value,
        items, 
        total, paid,
        due: parseFloat(document.getElementById('dueAmount').innerText||0),
        overpay: parseFloat(document.getElementById('overpay').innerText||0),
        notes: document.getElementById('saleNotes').value,
        language: currentLang
    };
}


/* Save Data (Combined Sales and Collection) */
async function saveData(){
    const data = collectData();

    // --- Detailed Validation Check ---
    const requiredFields = [
        { id: 'invoiceDate', name: T.labelDate, value: data.date },
        { id: 'custName', name: T.labelCustName, value: data.customer },
        { id: 'custPhone', name: T.labelCustPhone, value: data.phone },
        { id: 'saleEmployee', name: T.labelEmployee, value: data.employee },
        { id: 'saleBranch', name: T.labelBranch, value: data.branch },
        { id: 'salePaymentMethod', name: T.labelPaymentMethod, value: data.method },
        { id: 'saleClientType', name: T.labelClientType, value: data.clientType },
        { id: 'saleProgram', name: T.labelProgram, value: data.program },
        { id: 'saleChannel', name: T.labelChannel, value: data.channel },
        { id: 'saleScreen', name: T.labelScreen, value: data.screen },
        { id: 'grandTotal', name: T.labelGrandTotal, value: data.total, isAmount: true },
        { id: 'paidAmount', name: T.labelPaidAmount, value: data.paid, isAmount: true }
    ];

    let missingFields = [];
    requiredFields.forEach(field => {
        // Check for empty string or null (amounts can be 0)
        if (!field.value && field.value !== 0 || (typeof field.value === 'string' && field.value.trim() === '')) {
            missingFields.push(field.name);
        }
        
        // Additional check for phone number length/pattern
        if (field.id === 'custPhone' && field.value && field.value.length !== 11) {
            if (!missingFields.includes(T.alertPhoneLength)) missingFields.push(T.alertPhoneLength);
        }
    });

    if (missingFields.length > 0) {
        alert(`${T.alertMissingFields} \n- ${missingFields.join('\n- ')}`);
        return;
    }
    
    // 1. إرسال البيانات إلى Apps Script لحفظها في Google Sheet
    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(data),
            // ⚠️ تم حذف الـ Headers بالكامل لتجنب أخطاء CORS و Content-Type
        });
        
        // تحقق من أن الرد نفسه كان ناجحًا (حالة HTTP 200)
        if (!response.ok) {
            // إذا كان الرد HTTP غير 200 (مثلاً 404 أو 500)، اقرأ نص الخطأ
            const errorText = await response.text();
            throw new Error(`HTTP Error ${response.status}: ${errorText.substring(0, 100)}...`);
        }

        // محاولة قراءة الرد كـ JSON
        let result;
        try {
            result = await response.json();
        } catch (e) {
            // إذا فشل تحليل JSON، فهذا يعني أن Apps Script أرجع خطأ HTML غير مُعالج
            throw new Error("Received non-JSON response. Check Apps Script logs for detailed error.");
        }


        if (result.result === "success") {
            alert(T.alertSaveSuccess);
        } else if (result.result === "error") {
            // إذا أرجع السكربت رسالة خطأ مُعالجة
            alert(`فشل في الحفظ (من Apps Script): ${result.error}. التفاصيل: ${result.details}`);
        } else {
             alert("فشل في الحفظ: الرد من الخادم غير متوقع.");
        }

    } catch(e) {
        // فشل اتصال الشبكة أو فشل في تحليل الـ JSON
        alert("فشل الاتصال بخادم الحفظ. تأكد من أن رابط Apps Script صحيح ومنشور. الخطأ الفني: " + e.message);
        console.error("Connection/Parsing Error:", e);
        return;
    }

    // عرض أزرار ما بعد الحفظ
    document.getElementById('afterSaveSales').style.display='flex';
}

/* Invoice helpers (PDF Generation) */
function escapeHtml(s){ if(!s&&s!==0)return ''; return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) }

function buildInvoiceHTML(invoice){
  const pdfT = langMap[invoice.language]; 
  const direction = pdfT.dir;
  const textAlign = (direction === 'rtl' ? 'right' : 'left');

  const items = invoice.items.map(it=>`<tr><td style="width:75%; text-align: ${textAlign};">${escapeHtml(it.name)}</td><td style="width:25%; direction:ltr; text-align:left;">1</td></tr>`).join('');
  
  return `<div style="padding:12px;font-family:inherit;color:#123; direction:${direction}">
  <div style="display:flex;justify-content:space-between;align-items:center; flex-direction: ${direction === 'rtl' ? 'row-reverse' : 'row'};">
  <div><img src="https://syecommunity.com/wp-content/uploads/2020/12/SYE-Logo.png" style="height:48px" /></div>
  <div style="text-align:${textAlign}"><div style="font-weight:800;color:#0b3b47">${pdfT.pdfInvoice}</div></div> 
  </div>
  <hr style="margin:12px 0;border-color:#e6eef2" />
  <div style="display:flex;justify-content:space-between; flex-direction: ${direction === 'rtl' ? 'row-reverse' : 'row'}; text-align: ${textAlign};">
  <div><strong>${pdfT.pdfCustomer}:</strong> ${escapeHtml(invoice.customer)}<br><strong>${pdfT.pdfWhatsapp}:</strong> <span dir="ltr">20${escapeHtml(invoice.phone)}</span><br><strong>${pdfT.pdfEmployee}:</strong> ${escapeHtml(invoice.employee)}<br><strong>${pdfT.pdfBranch}:</strong> ${escapeHtml(invoice.branch)}</div>
  <div><strong>${pdfT.pdfDate}:</strong> <span dir="ltr">${invoice.date}</span><br><strong>${pdfT.pdfMethod}:</strong> ${escapeHtml(invoice.method)}</div>
  </div>
  <table style="margin-top:12px;border:1px solid #e6eef2; direction:${direction}"><thead><tr><th style="text-align: ${textAlign}">${pdfT.pdfItem}</th><th style="text-align: ${textAlign}">${pdfT.pdfQuantity}</th></tr></thead><tbody>${items}</tbody></table>
  <div class="totals" style="margin-top:12px; border-top: 1px solid #e6eef2; padding-top: 12px; justify-content: ${direction === 'rtl' ? 'flex-start' : 'flex-end'}; flex-direction: column; align-items: ${direction === 'rtl' ? 'flex-end' : 'flex-end'};">
  <div class="box" style="width: 250px;">${pdfT.pdfTotal}: <span dir="ltr">${invoice.total.toFixed(2)}</span> EGP</div>
  <div class="box" style="width: 250px;">${pdfT.pdfPaid}: <span dir="ltr">${invoice.paid.toFixed(2)}</span> EGP</div>
  <div class="box" style="width: 250px;">${pdfT.pdfDue}: <span dir="ltr">${invoice.due.toFixed(2)}</span> EGP</div>
  <div class="box" style="width: 250px;">${pdfT.pdfOverpay}: <span dir="ltr">${invoice.overpay.toFixed(2)}</span> EGP</div></div>
  <div style="margin-top:12px; text-align: ${textAlign};"><strong>${pdfT.pdfNotes}:</strong> ${escapeHtml(invoice.notes)}</div></div>`;
}

function previewInvoice() {
    const data = collectData();
    const w = window.open('', '_blank');
    w.document.write('<html><head><title>' + langMap[data.language].pdfTitle + '</title><style>@page{size: A4; margin: 15mm;} body{font-family: \'Tajawal\', sans-serif;}</style></head><body>' + buildInvoiceHTML(data) + '</body></html>');
    w.document.close();
}


function downloadPDF(){ 
    const data = collectData();
    if(!data.customer){alert(T.alertCustomerNameMissing); return;}
    generateCleanPDF(data); 
}

function generateCleanPDF(invoice){
  const div=document.createElement('div'); div.innerHTML=buildInvoiceHTML(invoice);
  // Format file name: Invoice-[Customer Name]-[Date].pdf
  const fileName = `Invoice-${invoice.customer}-${invoice.date}.pdf`;
  html2pdf().set({
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { avoid: '.card' },
    margin: 10 // Smaller margin for better fit
}).from(div).save(fileName);
}

function sendInvoiceWhatsApp(){
  const invoice = collectData();
 // 1. Remove any non-digit characters from the phone number
  const cleanPhone = invoice.phone.replace(/\D/g, ''); 
 // 2. Prepend '20' (Egypt country code)
  const fullWhatsappNumber = '20' + cleanPhone; 

  // Call generateCleanPDF to download a copy, then open WhatsApp link
  generateCleanPDF(invoice); 
  
 // Use wa.me/number to open chat directly
  const waUrl=`https://wa.me/${fullWhatsappNumber}?text=${encodeURIComponent(T.pdfCustomer + ': ' + invoice.customer + ' - ' + T.pdfTotal + ': ' + invoice.total.toFixed(2) + ' EGP')}`;
  window.open(waUrl,'_blank');
}

  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('invoiceDate').value=today;

  populateSelect('saleEmployee', EMPLOYEES);
  populateSelect('saleBranch', BRANCHES);
  populateSelect('salePaymentMethod', PAYMENT_METHODS);
  
  // Set default values for CRM fields
  document.getElementById('saleProgram').value = 'Online';
  document.getElementById('saleClientType').value = 'NEW';
  
  // Attach change listener to manual total inputs
  document.getElementById('grandTotal').addEventListener('input', calculateTotals);
  document.getElementById('paidAmount').addEventListener('input', calculateTotals);

  // Add the ONE initial row
  addServiceRow(); 
  calculateTotals();
}
document.addEventListener('DOMContentLoaded',init);
