<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SYE Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<style>
:root{--bg:#f7fbfc;--card:#fff;--muted:#64707a;--accent:#2aa6c6;--accent-2:#6fd1c0;--radius:12px;--shadow:0 10px 30px rgba(17,24,39,0.06);--success:#16a34a; --error: #dc2626;}
*{box-sizing:border-box} 
body{font-family:'Tajawal',sans-serif;background:var(--bg);margin:0;color:#0b2a33;padding:20px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1100px;margin:0 auto; display:none; animation:fadeIn 0.5s;} 
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
header{display:flex;align-items:center;gap:16px; justify-content: space-between; margin-bottom: 20px;} 
header img{height:45px; border-radius:8px} 
header h1{margin:0; font-size:16px; font-weight:800; color:#08303a; letter-spacing: -0.5px;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-top:14px;}
.row{display:flex;gap:12px;align-items:flex-end; margin-bottom: 12px; flex-wrap: wrap;} 
.col{flex:1; min-width: 200px;}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px; font-weight: bold;}
.required-star { color: var(--error); margin: 0 4px; }
input, select, textarea { width:100%; padding:10px; border-radius:10px; border:2px solid var(--accent); background:transparent; outline:none; font-family: inherit;}
html[dir="rtl"] .rtl-input, html[dir="rtl"] textarea { direction: rtl; text-align: right; }
input:focus, select:focus, textarea:focus{box-shadow:0 0 10px rgba(42,166,198,0.2); border-color:var(--accent-2)}
button{padding:10px 14px;border-radius:10px;border:0;cursor:pointer;font-weight:700; transition: 0.3s; font-family: inherit;}
.btn-primary{background:linear-gradient(90deg,var(--accent-2),var(--accent));color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid #e6eef2} 
#adminPanel { display: none; margin-bottom: 20px; border: 2px solid #ffd700; background: #fffdf0; }
.user-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 13px; }
.offer-box { background: #f0f9ff; border: 1px dashed var(--accent); padding: 15px; border-radius: 10px; margin-top: 10px; display: none; }
.check-row { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--muted); margin-top: 5px;}
.totals{display:flex;gap:12px;justify-content:flex-end;margin-top:20px;} 
.box{background:#fbfeff;padding:10px 14px;border-radius:10px;border:1px solid #eef6f8}
#loginSection { max-width: 400px; margin: 80px auto; text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: var(--shadow); }
#searchResults { border-top: 1px solid #eee; padding-top: 15px; }

/* تنسيقات الفاتورة الاحترافية للمعاينة والـ PDF */
.invoice-print-container { font-family: 'Tajawal', sans-serif; background: #fff; padding: 20px; border-radius: 10px; width: 800px; margin: auto; border: 1px solid #eee; }
.inv-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #5b2dff; padding-bottom: 15px; margin-bottom: 20px; }
.inv-logo img { height: 60px; }
.inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.inv-box { background: #f9fafc; padding: 10px; border-radius: 6px; font-size: 14px; border: 1px solid #f0f0f0; }
.inv-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
.inv-table th { background: #5b2dff; color: #fff; padding: 10px; font-size: 14px; text-align: center; }
.inv-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
.inv-totals { width: 250px; margin-right: auto; margin-top: 20px; }
.inv-totals div { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; border-bottom: 1px solid #f9f9f9; }
.inv-total-final { font-size: 17px; font-weight: bold; color: #5b2dff; margin-top: 5px; border-top: 2px solid #5b2dff; padding-top: 5px !important; }
.inv-rules { margin-top: 30px; padding: 15px; background: #fafafa; border-radius: 8px; font-size: 11px; line-height: 1.6; color: #444; }
.inv-sig { margin-top: 25px; text-align: center; }
.inv-sig-btn { background: #5b2dff; color: #fff; padding: 8px 18px; border-radius: 6px; text-decoration: none; font-size: 13px; display: inline-block; }

/* تنسيقات كشف الحساب */
.statement-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; background: #fff; }
.statement-table th { background: #2aa6c6; color: white; padding: 10px; text-align: center; border: 1px solid #eee; }
.statement-table td { padding: 10px; text-align: center; border: 1px solid #eee; }
.statement-table tbody tr:hover { background-color: #f0f9ff; cursor: pointer; }
.summary-row { font-weight: bold; background: #f1f5f9 !important; }
</style>
</head>
<body>

<div id="loginSection">
    <img src="https://syecommunity.com/wp-content/uploads/2020/12/SYE-Logo.png" width="80">
    <h2 id="loginTitle">تسجيل الدخول</h2>
    <input type="text" id="loginUser" placeholder="Username" style="margin-bottom:10px">
    <input type="password" id="loginPass" placeholder="Password" style="margin-bottom:10px">
    <button onclick="handleLogin()" class="btn-primary" style="width:100%" id="btnLoginAction">دخول</button>
    <p id="loginError" style="color:var(--error); display:none; margin-top:10px;">خطأ في البيانات</p>
</div>

<div class="wrap" id="mainApp">
<header>
    <div style="display:flex; align-items: center; gap: 12px;">
        <img src="https://syecommunity.com/wp-content/uploads/2020/12/SYE-Logo.png">
        <div>
            <h1 id="headerTitle">نظام المبيعات الموحد</h1>
            <div class="muted"><span id="txtUserLabel">الموظف:</span> <span id="currentUserName" style="font-weight:bold; color:var(--accent);"></span></div>
        </div>
    </div>
    <div style="display:flex; gap:8px;">
        <button id="adminBtn" class="btn-ghost" onclick="toggleAdminPanel()" style="display:none; border-color: #ffd700;">⚙️ <span id="btnAdminTxt">الإدارة</span></button>
        <select id="langSelect" onchange="changeLanguage(this.value)" style="width: 80px; padding: 2px;">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
        <button class="btn-ghost" onclick="location.reload()" style="color:var(--error)" id="btnLogout">خروج</button>
    </div>
</header>

<section id="adminPanel" class="card">
    <h3 id="adminTitle">إدارة المستخدمين</h3>
    <div class="row">
        <div class="col"><input type="text" id="newUsername" placeholder="الاسم"></div>
        <div class="col"><input type="text" id="newUserPass" placeholder="الباسورد"></div>
        <div class="col">
            <label class="check-row"><input type="checkbox" id="permOffer"> <span id="txtPermO">عرض</span></label>
            <label class="check-row"><input type="checkbox" id="permDisc"> <span id="txtPermD">خصم</span></label>
        </div>
        <button class="btn-primary" onclick="addNewUser()" id="btnAddNewUserAction">إضافة</button>
    </div>
    <div id="usersList" style="max-height: 150px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #eee;"></div>
</section>

<section class="card" style="border: 2px solid var(--accent-2); background: #f0fffb;">
    <h3 style="margin-top:0; font-size:14px;">🔍 بحث وتعديل معاملات الطالب</h3>
    <div class="row">
        <div class="col"><input type="text" id="searchPhone" placeholder="أدخل رقم الهاتف للبحث..."></div>
        <button class="btn-primary" id="btnSearch" onclick="searchStudent()">بحث</button>
        <button class="btn-ghost" id="btnStatement" onclick="generateStatement()" style="display:none; border-color: var(--accent);">📄 كشف حساب</button>
    </div>
    <div id="searchResults" style="display:none">
        <label id="labelRes">نتائج البحث:</label>
        <select id="transactionsList" onchange="loadTransactionData()"></select>
    </div>
    <div id="statementArea" class="card" style="display:none; border: 1px solid #ddd; padding: 15px; background: white;"></div>
</section>

<section class="card">
    <div class="row">
        <div class="col"><label id="labelDate"><span class="required-star">*</span> التاريخ</label><input type="date" id="invoiceDate"></div>
        <div class="col"><label id="labelCustName"><span class="required-star">*</span> اسم العميل</label><input type="text" id="custName" class="rtl-input"></div>
        <div class="col"><label id="labelReceipt">رقم الإيصال</label><input type="text" id="receiptNo"></div>
    </div>
    <div class="row">
        <div class="col">
            <label id="labelPhone"><span class="required-star">*</span> رقم الهاتف</label>
            <input type="text" id="custPhone">
            <label class="check-row"><input type="checkbox" id="diffWhatsapp" onchange="toggleWhatsappField()"> <span id="labelDiffWA">واتساب مختلف؟</span></label>
        </div>
        <div class="col" id="waGroup" style="display:none"><label id="labelWA"><span class="required-star">*</span> رقم الواتساب</label><input type="text" id="custWhatsapp"></div>
    </div>
    <div class="row">
        <div class="col"><label id="labelBranch">الفرع</label><select id="saleBranch"></select></div>
        <div class="col"><label id="labelMethod">الدفع</label><select id="salePaymentMethod"></select></div>
        <div class="col"><label id="labelClientType">نوع العميل</label><select id="saleClientType"><option>NEW</option><option>CURRENT</option></select></div>
    </div>
    <div class="row">
        <div class="col"><label id="labelChannel">قناة البيع</label><select id="saleChannel"></select></div>
        <div class="col"><label id="labelScreen">رابط السكرين</label><input type="text" id="saleScreen"></div>
    </div>
    <div class="row"><div class="col"><label id="labelNotes">ملاحظات</label><textarea id="saleNotes" class="rtl-input"></textarea></div></div>

    <div class="card">
        <h4 id="labelItems">الخدمات والكتب</h4>
        <div id="servicesList"></div>
        <div style="margin-top:10px; display:flex; gap:10px;">
            <button class="btn-ghost" onclick="addItemRow('service')" id="btnAddS">+ خدمة</button>
            <button class="btn-ghost" onclick="addItemRow('book')" id="btnAddB">+ كتاب</button>
        </div>
    </div>

    <div class="row" style="margin-top:20px">
        <div id="optOffer" style="display:none; flex:1"><label class="check-row"><input type="checkbox" id="chkOffers" onchange="toggleOfferDiv()"> <span id="labelEnableOffer">تفعيل عرض</span></label></div>
        <div id="optDisc" style="display:none; flex:1"><label id="labelExtraD">خصم إضافي %</label><input type="number" id="extraDiscount" oninput="calculateTotals()" value="0"></div>
    </div>

    <div id="offerDiv" class="offer-box">
        <div class="row">
            <div class="col"><label id="labelLevels">المستويات</label><select id="offerLevels"></select></div>
            <div class="col"><label id="labelBooksC">الكتب</label><select id="offerBooks"></select></div>
        </div>
    </div>

    <div class="row" style="margin-top:20px">
        <div class="col"></div>
        <div class="col"><label id="labelTotal">الإجمالي</label><input type="number" id="grandTotal" oninput="calculateTotals()" value="0"></div>
        <div class="col"><label id="labelFinal">بعد الخصم</label><input type="number" id="finalTotal" readonly style="background:#f8fafc"></div>
        <div class="col"><label id="labelPaid">المدفوع</label><input type="number" id="paidAmount" oninput="calculateTotals()" value="0"></div>
    </div>

    <div class="totals"><div class="box" id="boxDue">المستحق: <strong id="dueAmount">0.00</strong> EGP</div></div>

    <div style="margin-top:20px; display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap;">
        <button class="btn-ghost" onclick="previewInvoice()" id="btnPreview">👁️ معاينة</button>
        <button class="btn-ghost" onclick="downloadPDF()" id="btnPDF">📥 تحميل PDF</button>
        <button class="btn-ghost" onclick="sendWhatsApp()" id="btnWA" style="background:#25D366; color:white; border:none;">📱 واتساب</button>
        <button class="btn-primary" onclick="saveData()" id="btnSave">💾 حفظ البيانات</button>
        <button class="btn-primary" onclick="saveData()" id="btnUpdate" style="display:none; background: linear-gradient(90deg, #f59e0b, #d97706);">✏️ حفظ التعديلات</button>
        <button class="btn-ghost" onclick="resetForm()" id="btnReset">إعادة تعيين</button>
    </div>
</section>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLuNzv_e-fqpHC9b4NQA3H75HCiM5f-uIJtxpe1PCEjt1Idu1pgYouMI1strrK8Li1lQ/exec";

let users = JSON.parse(localStorage.getItem('sye_users')) || [{user: 'admin', pass: 'admin123', role: 'admin', perms: {offer: true, discount: true}}];
let currentUser = null;
let currentLang = 'ar';
let currentEditingRow = null; 
let lastSearchResults = []; // لحفظ نتائج البحث لعمل كشف الحساب

const BRANCHES = ['Nasr City', 'Dokki', 'Maadi', 'October', 'Online'];
const CHANNELS = ['Facebook','WhatsApp','Instagram','Website','Referral'];
const METHODS = ['Fawry', 'Credit card', 'InstaPay', 'Client Balance', 'VC-01001883884', 'VC-01022850171', 'VC-01064223325', 'EC-01111327387'];

const T = {
    ar: {
        hTitle: "نظام المبيعات الموحد", login: "تسجيل الدخول", btnLogin: "دخول", userL: "الموظف:", admin: "الإدارة", logout: "خروج",
        date: "التاريخ", name: "اسم العميل", receipt: "رقم الإيصال", phone: "رقم الهاتف", diffWA: "واتساب مختلف؟", wa: "رقم الواتساب",
        branch: "الفرع", method: "الدفع", client: "نوع العميل", channel: "قناة البيع", screen: "رابط السكرين", notes: "ملاحظات",
        items: "الخدمات والكتب", addS: "+ خدمة", addB: "+ كتاب", offer: "تفعيل عرض", extraD: "خصم إضافي %", total: "الإجمالي", 
        final: "بعد الخصم", paid: "المدفوع", due: "المستحق: ", preview: "👁️ معاينة", save: "💾 حفظ البيانات", reset: "إعادة تعيين",
        levels: "المستويات", booksC: "الكتب", pdf: "📥 تحميل PDF", waBtn: "📱 واتساب",
        alertSave: "تم تجميع البيانات للحفظ للعميل: ", alertFill: "برجاء ملء جميع الحقول الإجبارية", alertDel: "هل أنت متأكد من الحذف؟"
    },
    en: {
        hTitle: "Unified Sales System", login: "Login Access", btnLogin: "Login", userL: "User:", admin: "Admin Panel", logout: "Logout",
        date: "Date", name: "Customer Name", receipt: "Receipt No", phone: "Phone Number", diffWA: "Different WA?", wa: "WhatsApp No",
        branch: "Branch", method: "Payment", client: "Client Type", channel: "Sales Channel", screen: "Screen Link", notes: "Notes",
        items: "Services & Books", addS: "+ Service", addB: "+ Book", offer: "Enable Offer", extraD: "Extra Discount %", total: "Total", 
        final: "After Disc", paid: "Paid Amount", due: "Due: ", preview: "👁️ Preview", save: "💾 Save Data", reset: "Reset",
        levels: "Levels", booksC: "Books", pdf: "📥 Download PDF", waBtn: "📱 WhatsApp",
        alertSave: "Data collected for client: ", alertFill: "Please fill all required fields", alertDel: "Are you sure you want to delete?"
    }
};

// --- وظائف المساعدة لإنتاج الفاتورة الاحترافية ---
function generateInvoiceHTML(data) {
    const isAr = currentLang === 'ar';
    const itemsList = data.items.split(',').filter(x => x.trim() !== "");
    let tableRows = itemsList.map((item, index) => `
        <tr>
            <td>${index + 1}</td>
            <td>${item.trim()}</td>
            <td>1</td>
            <td>-</td>
            <td>-</td>
        </tr>
    `).join('');

    const signatureLink = `https://moyounis-ux.github.io/signature/?invNum=${data.receipt}&clientName=${encodeURIComponent(data.customer)}&phone=${data.phone}&issuedBy=${encodeURIComponent(data.branch)}&issuedAt=${encodeURIComponent(data.date)}`;

    return `
    <div class="invoice-print-container" dir="${isAr ? 'rtl' : 'ltr'}">
        <div class="inv-header">
            <div class="inv-logo"><img src="https://syecommunity.com/wp-content/uploads/2020/12/SYE-Logo.png"></div>
            <div style="text-align:${isAr ? 'left' : 'right'}">
                <div>${isAr ? 'رقم الإيصال' : 'Receipt'}: <b>${data.receipt || '---'}</b></div>
                <div>${isAr ? 'التاريخ' : 'Date'}: ${data.date}</div>
            </div>
        </div>

        <div class="inv-grid">
            <div class="inv-box">${isAr ? 'اسم العميل' : 'Customer'}: ${data.customer}</div>
            <div class="inv-box">${isAr ? 'رقم الهاتف' : 'Phone'}: ${data.phone}</div>
            <div class="inv-box">${isAr ? 'الفرع' : 'Branch'}: ${data.branch}</div>
            <div class="inv-box">${isAr ? 'الموظف' : 'Employee'}: ${data.employee}</div>
        </div>

        <table class="inv-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>${isAr ? 'الخدمة / الكتاب' : 'Service/Book'}</th>
                    <th>${isAr ? 'الكمية' : 'Qty'}</th>
                    <th>${isAr ? 'السعر' : 'Price'}</th>
                    <th>${isAr ? 'الإجمالي' : 'Total'}</th>
                </tr>
            </thead>
            <tbody>${tableRows}</tbody>
        </table>

        <div class="inv-totals">
            <div><span>${isAr ? 'الإجمالي' : 'Total'}</span><span>${data.grandTotal} EGP</span></div>
            <div><span>${isAr ? 'الخصم' : 'Discount'}</span><span>${data.discount}%</span></div>
            <div><span>${isAr ? 'بعد الخصم' : 'After Disc'}</span><span>${data.total} EGP</span></div>
            <div><span>${isAr ? 'المدفوع' : 'Paid'}</span><span>${data.paid} EGP</span></div>
            <div class="inv-total-final"><span>${isAr ? 'المستحق' : 'Due'}</span><span>${data.due} EGP</span></div>
        </div>

        <div class="inv-rules" style="text-align: justify; font-size: 10px; line-height: 1.4;">
            <h4 style="margin: 0 0 5px 0; border-bottom: 1px solid #ddd;">${isAr ? 'القواعد واللوائح التنظيمية' : 'Rules & Regulations'}</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <strong>${isAr ? 'أولاً: القواعد العامة' : 'General Rules'}:</strong><br>
                    1- الالتزام بالتحدث بالإنجليزية فقط داخل الفرع أو الأونلاين.<br>
                    2- SYE لها الحق في تحديد المدرسين بناءً على معايير تقنية وإدارية.<br>
                    3- يحق للمركز تغيير موعد بدء الدورة بحد أقصى 14 يوماً من التاريخ المتفق عليه.<br>
                    4- يلتزم الطالب بالسلوك العام والآداب واحترام قوانين المكان.
                </div>
                <div>
                    <strong>${isAr ? 'ثانياً: الحضور والامتحانات' : 'Attendance & Exams'}:</strong><br>
                    5- التأخير لأكثر من 30 دقيقة يعتبر غياباً.<br>
                    6- الحد الأقصى للغياب مرتان للمستويات العادية ومرة لمجموعات اليوم الواحد.<br>
                    7- رسوم تأجيل الامتحان (Late Exam) هي 75 جنيهاً بطلب مسبق.<br>
                    8- إعادة المستوى تمنح العميل خصم 50% من سعر المستوى الأصلي.
                </div>
            </div>
            <div style="margin-top: 8px;">
                <strong>${isAr ? 'ثالثاً: سياسة التأجيل والاسترداد' : 'Deferral & Refund Policy'}:</strong><br>
                9- التأجيل قبل البداية بـ 3 أيام كحد أدنى برسوم 100 جنيه، وصلاحية التأجيل شهران فقط.<br>
                10- لا يوجد استرداد نقدي بعد بداية الدورة أو في حالة الحجز ضمن "عروض" أو "خصومات".<br>
                11- عند الاسترداد (قبل البداية) يُخصم 150 جنيهاً مصاريف إدارية مع ضرورة وجود الإيصال.<br>
                12- الرصيد النقدي صالح لمدة 6 أشهر (أو سنة لحجز +4 مستويات) ثم يلغى تلقائياً.<br>
                13- سعر الكتاب 125 جنيهاً (ورقي) أو 50 جنيهاً (PDF) وغير قابل للاسترداد.
            </div>
        </div>

        <div class="inv-sig">
            <p style="font-size:11px; margin-bottom:5px;">${isAr ? 'توقيعك أدناه يعد إقراراً بالاطلاع والموافقة على كافة الشروط المذكورة أعلاه' : 'Your signature is an acknowledgment of the terms above'}</p>
            <a href="${signatureLink}" class="inv-sig-btn" target="_blank">${isAr ? 'توقيع العميل' : 'Customer Signature'}</a>
        </div>
    </div>`;
}

// --- الوظائف الأساسية ---

async function searchStudent() {
    const phone = document.getElementById('searchPhone').value.trim();
    if(!phone) return alert("أدخل رقم الهاتف للبحث");
    const btn = document.getElementById('btnSearch');
    btn.disabled = true; btn.textContent = "...";
    try {
        const url = `${SCRIPT_URL}?action=search&phone=${encodeURIComponent(phone)}`;
        const response = await fetch(url);
        const results = await response.json();
        if (results.error) alert("خطأ: " + results.error);
        else {
            lastSearchResults = results; // حفظ النتائج لكشف الحساب
            displaySearchResults(results);
            document.getElementById('btnStatement').style.display = results.length > 0 ? 'inline-block' : 'none';
        }
    } catch (e) { alert("حدث خطأ في الاتصال بالسيرفر"); }
    finally { btn.disabled = false; btn.textContent = "بحث"; }
}

function displaySearchResults(results) {
    const resultsDiv = document.getElementById('searchResults');
    const list = document.getElementById('transactionsList');
    if(results && results.length > 0) {
        resultsDiv.style.display = 'block';
        list.innerHTML = '<option value="">اختر معاملة لتعديلها...</option>';
        results.forEach(res => {
            let opt = new Option(`${res.date} | ${res.customer} | ${res.total} EGP`, JSON.stringify(res));
            list.add(opt);
        });
    } else { alert("لا توجد معاملات سابقة لهذا الرقم"); resultsDiv.style.display = 'none'; }
}

// --- وظيفة توليد كشف الحساب ---
function generateStatement() {
    if(!lastSearchResults || lastSearchResults.length === 0) return;
    
    let totalBilled = 0, totalPaid = 0;
    let rowsHtml = lastSearchResults.map(res => {
        const billed = parseFloat(res.total || 0);
        const paid = parseFloat(res.paid || 0);
        totalBilled += billed; totalPaid += paid;
        const rowData = JSON.stringify(res).replace(/"/g, '&quot;');
        return `
            <tr onclick="loadFromStatement('${rowData}')">
                <td>${res.date}</td>
                <td style="text-align:right">${res.items || 'خدمات متنوعة'}</td>
                <td>${billed.toFixed(2)}</td>
                <td>${paid.toFixed(2)}</td>
                <td>${(billed - paid).toFixed(2)}</td>
            </tr>`;
    }).join('');

    const html = `
        <div id="printArea">
            <div style="text-align:center; margin-bottom:20px;">
                <img src="https://syecommunity.com/wp-content/uploads/2020/12/SYE-Logo.png" height="50">
                <h2 style="margin:10px 0; color:#2aa6c6;">كشف حساب طالب</h2>
                <p><b>الاسم:</b> ${lastSearchResults[0].customer} | <b>الهاتف:</b> ${lastSearchResults[0].phone}</p>
            </div>
            <table class="statement-table">
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>البيان (الخدمات)</th>
                        <th>القيمة</th>
                        <th>المدفوع</th>
                        <th>المتبقي</th>
                    </tr>
                </thead>
                <tbody>
                    ${rowsHtml}
                    <tr class="summary-row">
                        <td colspan="2">الإجمالي الكلي</td>
                        <td>${totalBilled.toFixed(2)}</td>
                        <td>${totalPaid.toFixed(2)}</td>
                        <td style="color:var(--error)">${(totalBilled - totalPaid).toFixed(2)}</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
            <button class="btn-primary" onclick="printStatement()">🖨️ طباعة</button>
            <button class="btn-ghost" onclick="downloadStatementPDF()">📥 تحميل PDF</button>
            <button class="btn-ghost" onclick="document.getElementById('statementArea').style.display='none'" style="color:var(--error)">إغلاق</button>
        </div>
    `;
    const area = document.getElementById('statementArea');
    area.innerHTML = html;
    area.style.display = 'block';
    area.scrollIntoView({ behavior: 'smooth' });
}

function loadFromStatement(jsonStr) {
    const data = JSON.parse(jsonStr);
    const list = document.getElementById('transactionsList');
    // محاكاة اختيار من القائمة المنسدلة
    for (let i = 0; i < list.options.length; i++) {
        if (list.options[i].text.includes(data.date) && list.options[i].text.includes(data.total)) {
            list.selectedIndex = i;
            break;
        }
    }
    loadTransactionData();
    document.getElementById('statementArea').style.display = 'none';
}

function printStatement() {
    const content = document.getElementById('printArea').innerHTML;
    const win = window.open('', '_blank');
    win.document.write(`
        <html><head><title>كشف حساب</title>
        <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
        <style>
            body { font-family: 'Tajawal', sans-serif; direction: rtl; padding: 20px; }
            .statement-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
            .statement-table th, .statement-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
            .statement-table th { background: #2aa6c6; color: white; }
            .summary-row { font-weight: bold; background: #f1f5f9; }
        </style></head><body>${content}</body></html>
    `);
    win.document.close();
    win.print();
}

function downloadStatementPDF() {
    const el = document.getElementById('printArea');
    const opt = {
        margin: 10,
        filename: `Statement_${lastSearchResults[0].customer}.pdf`,
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(el).save();
}

function loadTransactionData() {
    const list = document.getElementById('transactionsList');
    if(!list.value) { resetForm(); return; }
    const data = JSON.parse(list.value);
    currentEditingRow = data.rowId; 
    document.getElementById('invoiceDate').value = data.date;
    document.getElementById('custName').value = data.customer;
    document.getElementById('custPhone').value = data.phone;
    document.getElementById('receiptNo').value = data.receipt || '';
    document.getElementById('grandTotal').value = data.total_before_disc || data.total;
    document.getElementById('paidAmount').value = data.paid || 0;
    document.getElementById('saleNotes').value = data.notes || '';
    document.getElementById('saleBranch').value = data.branch || '';
    document.getElementById('salePaymentMethod').value = data.method || '';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('btnUpdate').style.display = 'block';
    calculateTotals();
    // تمرير تلقائي للنموذج
    document.getElementById('mainApp').scrollIntoView({ behavior: 'smooth' });
}

async function saveData() {
    const data = getInvoiceData();
    if(!data.customer || !data.phone) return alert(T[currentLang].alertFill);
    const isUpdate = !!currentEditingRow;
    const btn = isUpdate ? document.getElementById('btnUpdate') : document.getElementById('btnSave');
    btn.disabled = true; const oldText = btn.textContent; btn.textContent = "جاري الحفظ...";
    try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert(isUpdate ? "تم التعديل ✅" : "تم الحفظ ✅");
        resetForm();
    } catch (e) { alert("خطأ في الحفظ"); }
    finally { btn.disabled = false; btn.textContent = oldText; }
}

function handleLogin() {
    const u = document.getElementById('loginUser').value, p = document.getElementById('loginPass').value;
    const found = users.find(x => x.user === u && x.pass === p);
    if(found) {
        currentUser = found;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('currentUserName').textContent = currentUser.user;
        document.getElementById('adminBtn').style.display = currentUser.role === 'admin' ? 'block' : 'none';
        document.getElementById('optOffer').style.display = currentUser.perms.offer ? 'block' : 'none';
        document.getElementById('optDisc').style.display = currentUser.perms.discount ? 'block' : 'none';
        initApp();
    } else document.getElementById('loginError').style.display = 'block';
}

function initApp() {
    document.getElementById('invoiceDate').valueAsDate = new Date();
    populate('saleBranch', BRANCHES); populate('salePaymentMethod', METHODS); populate('saleChannel', CHANNELS);
    const ol = document.getElementById('offerLevels'), ob = document.getElementById('offerBooks');
    ol.innerHTML = ''; ob.innerHTML = '';
    for(let i=1; i<=12; i++) { ol.options.add(new Option(i, i)); ob.options.add(new Option(i, i)); }
    renderUsers();
    changeLanguage('ar');
}

function addNewUser() {
    const u = document.getElementById('newUsername').value, p = document.getElementById('newUserPass').value;
    if(!u || !p) return;
    users.push({
        user: u, pass: p, role: 'user', 
        perms: { offer: document.getElementById('permOffer').checked, discount: document.getElementById('permDisc').checked }
    });
    localStorage.setItem('sye_users', JSON.stringify(users));
    document.getElementById('newUsername').value = ''; document.getElementById('newUserPass').value = '';
    renderUsers();
}

function renderUsers() {
    const list = document.getElementById('usersList');
    list.innerHTML = users.map((u, i) => `
        <div class="user-item">
            <span>${u.user} (${u.role})</span>
            ${u.role !== 'admin' ? `<button onclick="deleteUser(${i})" style="color:red; background:none; border:none; cursor:pointer">✖</button>` : ''}
        </div>
    `).join('');
}

function deleteUser(i) {
    if(confirm(T[currentLang].alertDel)) {
        users.splice(i, 1); localStorage.setItem('sye_users', JSON.stringify(users)); renderUsers();
    }
}

function populate(id, opts) {
    const s = document.getElementById(id); s.innerHTML = '<option value="">...</option>';
    opts.forEach(o => s.options.add(new Option(o, o)));
}

function toggleWhatsappField() { document.getElementById('waGroup').style.display = document.getElementById('diffWhatsapp').checked ? 'block' : 'none'; }
function toggleOfferDiv() { document.getElementById('offerDiv').style.display = document.getElementById('chkOffers').checked ? 'block' : 'none'; }
function toggleAdminPanel() { const p = document.getElementById('adminPanel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

function calculateTotals() {
    const grand = parseFloat(document.getElementById('grandTotal').value || 0);
    const disc = parseFloat(document.getElementById('extraDiscount').value || 0);
    const paid = parseFloat(document.getElementById('paidAmount').value || 0);
    const final = grand - (grand * (disc / 100));
    document.getElementById('finalTotal').value = final.toFixed(2);
    document.getElementById('dueAmount').innerText = (final - paid).toFixed(2);
}

function resetForm() {
    ['custName','receiptNo','custPhone','custWhatsapp','saleScreen','saleNotes','searchPhone'].forEach(id => {
        const el = document.getElementById(id); if(el) el.value = '';
    });
    ['grandTotal','extraDiscount','paidAmount'].forEach(id => {
        const el = document.getElementById(id); if(el) el.value = 0;
    });
    document.getElementById('servicesList').innerHTML = '';
    document.getElementById('diffWhatsapp').checked = false;
    document.getElementById('chkOffers').checked = false;
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('statementArea').style.display = 'none';
    document.getElementById('btnStatement').style.display = 'none';
    currentEditingRow = null; 
    document.getElementById('btnSave').style.display = 'block';
    document.getElementById('btnUpdate').style.display = 'none';
    toggleWhatsappField(); toggleOfferDiv(); calculateTotals();
}

function getInvoiceData() {
    const items = []; document.querySelectorAll('.itemSelect').forEach(s => { if(s.value) items.push(s.value); });
    if(document.getElementById('chkOffers').checked) {
        items.push(`OFFER: ${document.getElementById('offerLevels').value} L / ${document.getElementById('offerBooks').value} B`);
    }
    return {
        rowId: currentEditingRow, 
        customer: document.getElementById('custName').value,
        phone: document.getElementById('custPhone').value,
        whatsapp: document.getElementById('diffWhatsapp').checked ? document.getElementById('custWhatsapp').value : document.getElementById('custPhone').value,
        date: document.getElementById('invoiceDate').value,
        items: items.join(", "),
        grandTotal: document.getElementById('grandTotal').value,
        discount: document.getElementById('extraDiscount').value,
        total: document.getElementById('finalTotal').value,
        paid: document.getElementById('paidAmount').value,
        due: document.getElementById('dueAmount').innerText,
        notes: document.getElementById('saleNotes').value,
        employee: currentUser ? currentUser.user : 'Unknown',
        receipt: document.getElementById('receiptNo').value,
        branch: document.getElementById('saleBranch').value,
        method: document.getElementById('salePaymentMethod').value
    };
}

function addItemRow(type) {
    const container = document.getElementById('servicesList');
    const div = document.createElement('div'); div.className = 'row'; div.style.marginTop = '5px';
    const opts = type === 'service' ? ['Program','Conversation','Teens','Kids','Native','Speaking Club','Business','IELTS','Placement','Delay fees'] : Array.from({length:12}, (_,i)=>`Book Level ${i+1}`);
    div.innerHTML = `<div style="flex:1"><select class="itemSelect"><option value="">Choose...</option>${opts.map(o=>`<option>${o}</option>`).join('')}</select></div>
                     <button onclick="this.parentElement.remove()" style="color:red; background:none; border:1px solid #eee">✖</button>`;
    container.appendChild(div);
}

function previewInvoice() {
    const data = getInvoiceData();
    const html = generateInvoiceHTML(data);
    const win = window.open('', '_blank');
    win.document.write(`
        <html><head><title>Preview</title>
        <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
        <style>${document.querySelector('style').innerHTML}</style>
        </head><body style="background:#f4f6fb; padding:20px;">${html}</body></html>
    `);
}

function downloadPDF() {
    const data = getInvoiceData();

    const el = document.createElement('div');
    el.innerHTML = html;
    const opt = {
        margin: 10,
        filename: `Invoice_${data.customer}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(el).save();
}
